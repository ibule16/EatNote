<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食物圖鑑</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button id="addRecordBtn">新增紀錄</button>
    <button id="loginBtn">登入</button>

    <div id="foodList"></div> <!-- 列表容器 -->

    <!-- 彈出視窗背景層 (覆蓋整個螢幕) -->
    <div id="modal" class="modal" style="display: none;">
        <div class="modalContent">
            <span id="closeModal">&times;</span> <!-- 顯示特殊符號 X -->

            <h2>新增記錄</h2>

            <div class="formGroup">
                <label for="date">日期：</label>
                <input type="date" id="date">
            </div>

            <div class="formGroup">
                <label for="shopName">店家名稱：</label>
                <input type="text" id="shopName">
            </div>

            <div class="formGroup">
                <label for="foodName">食物名稱：</label>
                <input type="text" id="foodName">
            </div>

            <div class="formRow">
                <div class="formGroup">
                <label for="foodType">類型：</label>
                <input list="foodTypes" id="foodType">
                <datalist id="foodTypes">
                    <option value="飲料"></option>
                    <option value="飯"></option>
                    <option value="麵"></option>
                    <option value="早餐"></option>
                    <option value="其他"></option>
                </datalist>
                </div>

                <div class="formGroup">
                <label for="price">價格：</label>
                <input type="number" id="price">
                </div>    
            </div>
            
            <div class="formGroup">
                <label for="comment">感想：</label>
                <textarea id="comment"></textarea>
            </div>

            <div class="formGroup">
                <label for="rating">評分</label>
                <input type="number" id="rating" min="1" max="5">
            </div>
            
            <div class="formGroup">
                <label for="photo">上傳照片：</label>
                <input type="file" id="photo" accept="image/*">
            </div>

            <div class="formGroup">
                <label for="url">連結：</label>
                <input type="url" id="url">
            </div>
            
            <button id="saveBtn">儲存</button>
        </div>
    </div>

    <script type="module" src="script.js"></script> <!-- 加入 Firebase 要寫 mudule -->
</body>
</html>
